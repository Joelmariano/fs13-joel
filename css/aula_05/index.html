<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levana</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.png">
    <script src="https://kit.fontawesome.com/6de49511ba.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --marrom: #935E31;
            --marfim: #F3E5DB;
            --preto-text: #2d2d2d;
            --branco-bg: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #e0e5ec;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Principal */
        .card-container {
            width: 100%;
            max-width: 380px;
            height: 800px;
            /* Altura fixa simulando tela */
            background-color: #ffffff;
            border-radius: 45px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Formas decorativas de fundo */
        .bg-shape-1 {
            position: absolute;
            top: -50px;
            left: -50px;
            width: 250px;
            height: 250px;
            background-color: var(--marfim);
            border-radius: 50%;
            z-index: 0;
        }

        .bg-shape-2 {
            position: absolute;
            top: 150px;
            left: -100px;
            width: 200px;
            height: 200px;
            background-color: var(--marfim);
            border-radius: 50%;
            z-index: 0;
        }

        /* Área do Topo */
        .header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding-top: 60px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Circulo da Logo */
        .logo-circle {
            width: 110px;
            height: 110px;
            background-color: var(--marrom);
            border-radius: 50%;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(147, 94, 49, 0.2);
            overflow: hidden;
            /* Garante que a imagem não saia do círculo */
        }

        /* Estilo para a imagem do ícone dentro do círculo */
        .logo-img-icon {
            max-width: 70%;
            /* Ocupa no máximo 65% do círculo */
            max-height: 70%;
            object-fit: contain;
            /* Mantém a proporção da imagem */
        }

        /* Estilo para a imagem do nome da marca */
        .logo-img-nome {
            display: block;
            max-width: 75%;
            /* Ocupa no máximo 75% da largura do cartão */
            max-height: 100px;
            /* Limita a altura para não empurrar muito os botões */
            margin: 0 auto 30px auto;
            /* Alinhamento e margem inferior */
            object-fit: contain;
        }

        /* Parte inferior */
        .bottom-section {
            background-color: var(--marrom);
            border-radius: 50px 50px 0 0;
            padding: 40px 25px;
            position: relative;
            z-index: 2;
            height: 420px;
            display: flex;
            flex-direction: column;
            margin-top: auto;
        }

        /* Forma curva atrás da seção marrom */
        .magenta-wave {
            position: absolute;
            right: -20px;
            bottom: 350px;
            width: 180px;
            height: 180px;
            background-color: var(--marfim);
            border-radius: 50%;
            z-index: 1;
        }

        /* Texto: Clique e acesse */
        .subtitle {
            color: #fff;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 400;
            margin-bottom: 25px;
        }

        .subtitle i {
            margin-left: 5px;
        }

        /* Botões de Link */
        .link-btn {
            display: flex;
            align-items: center;
            background-color: #fff;
            color: var(--marrom);
            text-decoration: none;
            padding: 6px;
            border-radius: 50px;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .link-btn:active {
            transform: scale(0.98);
        }

        .btn-icon {
            width: 45px;
            height: 45px;
            background-color: var(--marfim);
            color: var(--marrom);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            flex-shrink: 0;
             /* Garante que o ícone não encolha */
             margin-right: 15px;
        }
        .btn-icon.text-icon {
            font-size: 0.8rem;
            font-weight: 980;
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            padding-right: 45px;
            /* Compensa o tamanho do ícone para centralizar o texto */
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* Rodapé Redes Sociais */
        .social-footer {
            margin-top: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            color: #fff;
        }

        .social-icon {
            width: 25px;
            height: 25px;
            background-color: var(--marfim);
            max-width: 50%;
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            text-decoration: none;
        }

        .social-footer span {
            font-size: 0.9rem;
            font-weight: 400;
        }

        .social-footer strong {
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="bg-shape-1"></div>
        <div class="bg-shape-2"></div>
        <div class="magenta-wave"></div>
        <div class="header">
            <div class="logo-circle">
                <img 
                    src="img/logo-icon.png"
                    alt="logo-icone"
                    class="logo-img-icon"
                >
            </div>
            <img 
                src="img/logo.png"
                alt="logo-nome"
                class="logo-img-nome"
            >
        </div>
        <div class="bottom-section">
            <p class="subtitle">Clique e acesse</p>
            <a 
                href="https://wa.me/5585997763313" 
                class="link-btn" 
                target="_blank" 
                rel="noopener noreferrer"
            >
                <div class="btn-icon">
                    <i 
                        class="fa-brands fa-whatsapp" 
                        style="color: rgb(147, 94, 49);"
                    >
                    </i>
                </div>
                <span class="btn-text">Fale pelo Whatsapp</span>
            </a>
            <a 
                href="https://instagram.com/levanafitness" 
                class="link-btn" 
                target="_blank" 
                rel="noopener noreferrer"
            >
                <div class="btn-icon">
                    <i 
                        class="fa-brands fa-instagram"
                        style="color: rgb(147, 94, 49);"
                    >
                    </i>
                </div>
                <span class="btn-text">Visite nosso Instagram</span>
            </a>
            <a 
                href="https://www.levana.com.br/"
                class="link-btn" 
                target="_blank" 
                rel="noopener noreferrer"
            >
                <div class="btn-icon text-icon">
                    <i 
                        class="fa-solid fa-globe" 
                        style="color: rgb(147, 94, 49);"
                    >
                    </i>
                </div>
                <span class="btn-text">Visite nosso Site</span>
            </a>
            <div class="social-footer">
                <a 
                    href="https://instagram.com/levanafitness" 
                    class="social-icon"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <i 
                        class="fa-brands fa-instagram"
                        style="color: rgb(147, 94, 49);">
                    </i>
                </a>
                <a 
                    href="https://www.tiktok.com/@uselevanaoficial"
                    class="social-icon" 
                    target="_blank"
                    rel="noopener noreferrer">
                    <i 
                        class="fa-brands fa-tiktok"
                        style="color: rgb(147, 94, 49);">
                    </i>
                </a>
                <span>Redes Sociais</span>
            </div>
        </div>
    </div>
</body>
</html>
